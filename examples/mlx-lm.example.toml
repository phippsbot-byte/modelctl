[model]
id = "mlx-qwen-served"
model_id = "default_model"
endpoint = "http://127.0.0.1:8123/v1"
description = "MLX mlx_lm server using a reversible served overlay"

[start]
command = ["/opt/homebrew/bin/python3.11", "-m", "mlx_lm", "server", "--model", "$HOME/.cache/mlx-models/my-qwen-model-served", "--host", "127.0.0.1", "--port", "8123", "--max-tokens", "4096", "--temp", "0.23", "--top-p", "0.9", "--chat-template-args", "{\"enable_thinking\":false}", "--decode-concurrency", "1", "--prompt-concurrency", "1", "--prompt-cache-size", "4", "--prompt-cache-bytes", "4294967296", "--log-level", "INFO"]
cwd = "$HOME/.cache/mlx-models/my-qwen-model-served"
log_path = "~/.local/state/modelctl/mlx-qwen-served.log"
pid_path = "~/.local/state/modelctl/mlx-qwen-served.pid.json"
startup_timeout_sec = 300
readiness_url = "http://127.0.0.1:8123/v1/models"
readiness_contains = "my-qwen-model-served"

[preflight]
required_paths = ["$HOME/.cache/mlx-models/my-qwen-model-served"]
exclusive_ports = [8123]
max_swap_gib = 8

[health]
max_swap_gib = 8
max_swap_delta_gib = 1
sample_sec = 5

[[preflight.disk]]
path = "$HOME/.cache/mlx-models"
min_free_gib = 5

[smoke]
prompt = "Reply with exactly the word pong."
expect = "pong"
max_tokens = 32
temperature = 0
